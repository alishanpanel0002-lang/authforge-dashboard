<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthForge</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text: #ededed;
  --muted: #888;
  --accent: #fff;
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.1);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.1);
  --font: 'Geist', -apple-system, sans-serif;
  --radius: 8px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.wrap { width: 100%; max-width: 360px; padding: 24px; }
.logo { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; justify-content: center; }
.logo-dot { width: 20px; height: 20px; background: var(--blue); border-radius: 4px; }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
h1 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 6px; padding: 3px; margin-bottom: 20px; }
.tab { flex: 1; padding: 6px; border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 13px; font-weight: 500; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.field input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.15s; }
.field input:focus { border-color: var(--border-hover); }
.field input::placeholder { color: #444; }
.btn { width: 100%; padding: 8px; background: var(--text); border: none; border-radius: var(--radius); color: #000; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.alert { display: none; padding: 9px 12px; border-radius: var(--radius); font-size: 12px; margin-top: 12px; }
.alert.err { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
.alert.ok { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
.form-section { display: none; }
.form-section.active { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">AuthForge</span>
  </div>
  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Access your developer dashboard</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div class="form-section active" id="s-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"></div>
      <button class="btn" onclick="doLogin()">Continue</button>
      <div class="alert" id="l-msg"></div>
    </div>

    <div class="form-section" id="s-register">
      <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="yourname"></div>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••"></div>
      <button class="btn" onclick="doRegister()">Create account</button>
      <div class="alert" id="r-msg"></div>
    </div>
  </div>
</div>
<script>
const API = 'https://authforge-backend-production.up.railway.app';
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (t==='login'&&i===0)||(t==='register'&&i===1)));
  document.getElementById('s-login').classList.toggle('active', t==='login');
  document.getElementById('s-register').classList.toggle('active', t==='register');
}
function msg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `alert ${type}`; el.style.display = 'block';
}
async function doLogin() {
  const email = document.getElementById('l-email').value;
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return msg('l-msg','All fields required','err');
  try {
    const r = await fetch(`${API}/api/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
    const d = await r.json();
    if (!r.ok) return msg('l-msg', d.error, 'err');
    localStorage.setItem('af_token', d.token);
    localStorage.setItem('af_user', JSON.stringify(d.developer));
    window.location.href = 'dashboard.html';
  } catch { msg('l-msg','Cannot connect to server','err'); }
}
async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  if (!username || !email || !password) return msg('r-msg','All fields required','err');
  try {
    const r = await fetch(`${API}/api/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,email,password}) });
    const d = await r.json();
    if (!r.ok) return msg('r-msg', d.error, 'err');
    localStorage.setItem('af_token', d.token);
    localStorage.setItem('af_user', JSON.stringify(d.developer));
    window.location.href = 'dashboard.html';
  } catch { msg('r-msg','Cannot connect to server','err'); }
}
if (localStorage.getItem('af_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
