<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyxAuth — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #02020a; --surface: #07071a; --surface2: #0d0d24;
  --border: rgba(109,40,217,0.18); --border2: rgba(109,40,217,0.35);
  --text: #f0f0ff; --muted: #8888aa; --muted2: #44445a;
  --primary: #7c3aed; --primary-dim: rgba(124,58,237,0.12);
  --primary-light: #a78bfa; --primary-glow: rgba(124,58,237,0.25);
  --accent: #8b5cf6;
  --green: #10b981; --green-dim: rgba(16,185,129,0.1);
  --red: #ef4444; --red-dim: rgba(239,68,68,0.1);
  --font: 'Inter', sans-serif; --r: 10px;
}
body.theme-christmas { --primary: #16a34a; --accent: #22c55e; --primary-dim: rgba(22,163,74,0.12); --primary-light: #86efac; --border: rgba(22,163,74,0.18); --border2: rgba(22,163,74,0.35); --primary-glow: rgba(22,163,74,0.25); }
body.theme-halloween { --primary: #ea580c; --accent: #f97316; --primary-dim: rgba(234,88,12,0.12); --primary-light: #fdba74; --border: rgba(234,88,12,0.18); --border2: rgba(234,88,12,0.35); --primary-glow: rgba(234,88,12,0.25); }
body.theme-ocean { --primary: #0284c7; --accent: #0ea5e9; --primary-dim: rgba(2,132,199,0.12); --primary-light: #7dd3fc; --border: rgba(2,132,199,0.18); --border2: rgba(2,132,199,0.35); --primary-glow: rgba(2,132,199,0.25); }
body.theme-blood { --primary: #b91c1c; --accent: #dc2626; --primary-dim: rgba(185,28,28,0.12); --primary-light: #fca5a5; --border: rgba(185,28,28,0.18); --border2: rgba(185,28,28,0.35); --primary-glow: rgba(185,28,28,0.25); }

body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  font-size: 14px; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%);
}
.page-wrap { width: 100%; max-width: 380px; padding: 20px; }

.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; justify-content: center; }
.logo-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
  box-shadow: 0 0 16px var(--primary-glow);
}
.logo-text { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
.logo-text span { color: var(--primary-light); }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

.social-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.btn-social {
  width: 100%; padding: 10px 14px; border-radius: var(--r);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  gap: 10px; transition: all 0.15s;
}
.btn-social:hover { background: var(--primary-dim); border-color: var(--primary); }
.btn-social.discord { border-color: rgba(88,101,242,0.4); }
.btn-social.discord:hover { background: rgba(88,101,242,0.1); border-color: rgba(88,101,242,0.7); }

.or-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 12px; color: var(--muted); }

.tabs { display: flex; gap: 0; background: var(--surface2); border-radius: 8px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); }
.tab {
  flex: 1; padding: 7px; border: none; background: none;
  color: var(--muted); font-family: var(--font); font-size: 13px;
  font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.15s;
}
.tab.active { background: var(--primary); color: #fff; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
.field input {
  width: 100%; padding: 9px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text); font-family: var(--font); font-size: 13px; outline: none;
  transition: border-color 0.15s; color-scheme: dark;
}
.field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
.field input::placeholder { color: var(--muted2); }

.btn-primary {
  width: 100%; padding: 10px; border-radius: var(--r); font-family: var(--font);
  font-size: 13px; font-weight: 700; cursor: pointer; border: none;
  background: var(--primary); color: #fff; transition: all 0.2s;
  box-shadow: 0 4px 16px var(--primary-glow);
}
.btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
.btn-ghost {
  width: 100%; padding: 10px; border-radius: var(--r); font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border2); background: none; color: var(--muted);
  transition: all 0.15s; margin-top: 8px;
}
.btn-ghost:hover { color: var(--text); background: var(--primary-dim); }

.alert { display: none; padding: 9px 12px; border-radius: var(--r); font-size: 12px; margin-top: 10px; }
.alert.err { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
.alert.ok { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
.alert.info { background: var(--primary-dim); border: 1px solid var(--border2); color: var(--primary-light); }
.form-section { display: none; }
.form-section.active { display: block; }

.verify-box { text-align: center; padding: 12px 0; }
.verify-icon { font-size: 40px; margin-bottom: 12px; }
.verify-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.verify-box p { font-size: 13px; color: var(--muted); line-height: 1.6; }

.twofa-code-input {
  text-align: center; font-size: 26px; letter-spacing: 12px; padding: 12px;
  font-family: 'JetBrains Mono', monospace;
}
.back-link { display: flex; align-items: center; justify-content: center; gap: 4px; color: var(--muted); font-size: 12px; margin-top: 16px; cursor: pointer; }
.back-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div class="logo-text">Nyx<span>Auth</span></div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <p class="card-sub">Sign in to your developer account</p>

    <div class="social-row">
      <button class="btn-social" onclick="googleSignIn()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="btn-social discord" onclick="discordSignIn()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.02.01.04.028.052a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Continue with Discord
      </button>
    </div>

    <div class="or-divider"><div class="or-line"></div><span class="or-text">or continue with email</span><div class="or-line"></div></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div class="form-section active" id="s-login">
      <div class="field"><label>Email Address</label><input type="email" id="l-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>
      <div class="alert" id="l-msg"></div>
    </div>

    <!-- 2FA -->
    <div class="form-section" id="s-2fa">
      <div class="verify-box">
        <div class="verify-icon">🔐</div>
        <h3>Two-Factor Auth</h3>
        <p>Enter the 6-digit code from your authenticator app</p>
      </div>
      <div class="field" style="margin-top:16px"><input type="text" id="totp-code" placeholder="000000" maxlength="6" class="twofa-code-input" onkeydown="if(event.key==='Enter')submit2FA()"></div>
      <button class="btn-primary" onclick="submit2FA()">Verify & Sign In</button>
      <button class="btn-ghost" onclick="cancel2FA()">← Back to Login</button>
      <div class="alert" id="twofa-msg"></div>
    </div>

    <!-- Verify Email -->
    <div class="form-section" id="s-verify">
      <div class="verify-box">
        <div class="verify-icon">📧</div>
        <h3>Check your inbox</h3>
        <p>We sent a verification link to <strong id="verify-email-display"></strong>. Click it to activate your account.</p>
      </div>
      <button class="btn-primary" onclick="resendVerification()" style="margin-top:20px">Resend Verification Email</button>
      <button class="btn-ghost" onclick="cancel2FA()">← Back to Login</button>
      <div class="alert" id="verify-msg"></div>
    </div>

    <!-- Register -->
    <div class="form-section" id="s-register">
      <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="yourname"></div>
      <div class="field"><label>Email Address</label><input type="email" id="r-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="Min. 8 characters" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account →</button>
      <div class="alert" id="r-msg"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://authforge-backend-production.up.railway.app';
const GOOGLE_CLIENT_ID = '623169749958-vc8l8hd9upjpp62fr9js8u68i7u6je5p.apps.googleusercontent.com';
const DISCORD_CLIENT_ID = '1483727384598548560';
let pendingEmail = '', pendingPassword = '', unverifiedEmail = '';

if (localStorage.getItem('af_token')) location.href = 'dashboard.html';

function msg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = 'alert ' + type; el.style.display = 'block';
}
function showSection(id) {
  document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (t === 'login' && i === 0) || (t === 'register' && i === 1)));
  showSection(t === 'login' ? 's-login' : 's-register');
}

function googleSignIn() {
  const p = new URLSearchParams({ client_id: GOOGLE_CLIENT_ID, redirect_uri: window.location.origin + window.location.pathname, response_type: 'code', scope: 'openid email profile', access_type: 'offline', prompt: 'select_account', state: 'google_oauth' });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + p;
}
function discordSignIn() {
  const p = new URLSearchParams({ client_id: DISCORD_CLIENT_ID, redirect_uri: window.location.origin + window.location.pathname, response_type: 'code', scope: 'identify email', state: 'discord_oauth' });
  window.location.href = 'https://discord.com/api/oauth2/authorize?' + p;
}

async function applyTheme() {
  try {
    const r = await fetch(API + '/api/public/config');
    const d = await r.json();
    const c = d.config || {};
    if (c.theme && c.theme !== 'dark') document.body.className = 'theme-' + c.theme;
  } catch(e) {}
}
applyTheme();

async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const verifyToken = params.get('verify');
  const teamInvite = params.get('team_invite');

  if (verifyToken) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const r = await fetch(API + '/api/auth/verify-email?token=' + verifyToken);
      const d = await r.json();
      showSection('s-login');
      msg('l-msg', r.ok ? '✅ ' + d.message : d.error, r.ok ? 'ok' : 'err');
    } catch { msg('l-msg', 'Verification failed', 'err'); }
    return;
  }
  if (teamInvite) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const r = await fetch(API + '/api/team/accept/' + teamInvite, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('af_token') } });
      const d = await r.json();
      if (r.ok) location.href = 'dashboard.html';
      else msg('l-msg', d.error, 'err');
    } catch { msg('l-msg', 'Failed to accept invite', 'err'); }
    return;
  }
  if (!code) return;
  history.replaceState({}, '', window.location.pathname);
  if (state === 'google_oauth') {
    try {
      const r = await fetch(API + '/api/auth/google-code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, redirect_uri: window.location.origin + window.location.pathname }) });
      const d = await r.json();
      if (!r.ok) { showSection('s-login'); return msg('l-msg', d.error || 'Google login failed', 'err'); }
      saveAndRedirect(d);
    } catch { showSection('s-login'); msg('l-msg', 'Cannot connect to server', 'err'); }
  }
  if (state === 'discord_oauth') {
    try {
      const r = await fetch(API + '/api/auth/discord-code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, redirect_uri: window.location.origin + window.location.pathname }) });
      const d = await r.json();
      if (!r.ok) { showSection('s-login'); return msg('l-msg', d.error || 'Discord login failed', 'err'); }
      saveAndRedirect(d);
    } catch { showSection('s-login'); msg('l-msg', 'Cannot connect to server', 'err'); }
  }
}

async function doLogin() {
  const email = document.getElementById('l-email').value;
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return msg('l-msg', 'All fields required', 'err');
  try {
    const r = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const d = await r.json();
    if (d.requires_2fa) { pendingEmail = email; pendingPassword = password; showSection('s-2fa'); return; }
    if (d.requires_verification) { unverifiedEmail = d.email || email; document.getElementById('verify-email-display').textContent = unverifiedEmail; showSection('s-verify'); return; }
    if (!r.ok) return msg('l-msg', d.error, 'err');
    saveAndRedirect(d);
  } catch { msg('l-msg', 'Cannot connect to server', 'err'); }
}

async function submit2FA() {
  const totp_code = document.getElementById('totp-code').value;
  if (!totp_code) return msg('twofa-msg', 'Enter the 6-digit code', 'err');
  try {
    const r = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: pendingEmail, password: pendingPassword, totp_code }) });
    const d = await r.json();
    if (!r.ok) return msg('twofa-msg', d.error, 'err');
    saveAndRedirect(d);
  } catch { msg('twofa-msg', 'Cannot connect', 'err'); }
}

function cancel2FA() { showSection('s-login'); document.getElementById('totp-code').value = ''; pendingEmail = ''; pendingPassword = ''; }

async function resendVerification() {
  if (!unverifiedEmail) return;
  try {
    const r = await fetch(API + '/api/auth/resend-verification', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: unverifiedEmail }) });
    const d = await r.json();
    msg('verify-msg', r.ok ? d.message : d.error, r.ok ? 'ok' : 'err');
  } catch { msg('verify-msg', 'Cannot connect', 'err'); }
}

async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  if (!username || !email || !password) return msg('r-msg', 'All fields required', 'err');
  try {
    const r = await fetch(API + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password }) });
    const d = await r.json();
    if (!r.ok) return msg('r-msg', d.error, 'err');
    unverifiedEmail = email;
    document.getElementById('verify-email-display').textContent = email;
    showSection('s-verify');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  } catch { msg('r-msg', 'Cannot connect to server', 'err'); }
}

function saveAndRedirect(d) {
  localStorage.setItem('af_token', d.token);
  localStorage.setItem('af_user', JSON.stringify(d.developer));
  location.href = 'dashboard.html';
}

handleOAuthCallback();
</script>
</body>
</html>
