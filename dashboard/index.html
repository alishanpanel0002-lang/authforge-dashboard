<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowAuth — Intelligence Login</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050508; --surface: #0a0a0f; --surface2: #121217;
  --border: rgba(220,38,38,0.1); --border2: rgba(220,38,38,0.2);
  --text: #ffffff; --muted: #a1a1aa; --muted2: #52525b;
  --red: #dc2626; --red-dim: rgba(220,38,38,0.1);
  --blue: #dc2626; --blue-dim: rgba(220,38,38,0.12);
  --green: #10b981; --green-dim: rgba(16,185,129,0.1);
  --purple: #ef4444; --purple-dim: rgba(239,68,68,0.1);
  --font: 'Outfit', sans-serif; --r: 10px;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.wrap { width: 100%; max-width: 360px; padding: 24px; }
.logo { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; justify-content: center; }
.logo-dot { width: 20px; height: 20px; border-radius: 5px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
h1 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.social-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.btn-social { width: 100%; padding: 9px 14px; border-radius: var(--r); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; }
.btn-social:hover { background: rgba(255,255,255,0.05); }
.btn-social.discord { border-color: rgba(88,101,242,0.4); }
.btn-social.discord:hover { background: rgba(88,101,242,0.08); }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; color: var(--muted); }
.tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 6px; padding: 3px; margin-bottom: 20px; }
.tab { flex: 1; padding: 6px; border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 13px; font-weight: 500; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.field input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.15s; }
.field input:focus { border-color: var(--border2); }
.field input::placeholder { color: #444; }
.btn { width: 100%; padding: 8px; border-radius: var(--r); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn-primary { background: var(--red); color: #fff; margin-top: 4px; border: none; font-weight: 700; transition: all 0.2s; }
.btn-primary:hover { background: #ef4444; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220,38,38,0.2); }
.btn-outline { background: none; border: 1px solid var(--border2); color: var(--muted); margin-top: 8px; }
.alert { display: none; padding: 8px 12px; border-radius: var(--r); font-size: 12px; margin-top: 10px; }
.alert.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
.alert.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
.alert.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }
.form-section { display: none; }
.form-section.active { display: block; }
.verify-box { text-align: center; padding: 16px 0; }
.verify-box .icon { font-size: 36px; margin-bottom: 12px; }
.verify-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.verify-box p { font-size: 13px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="logo-dot" style="background:var(--red); border-radius: 2px;"></div><span class="logo-text">Shadow<span style="color:var(--red)">Auth</span></span></div>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your developer account</p>

    <!-- Social buttons -->
    <div class="social-btns">
      <button class="btn-social" onclick="googleSignIn()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="btn-social discord" onclick="discordSignIn()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.02.01.04.028.052a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Continue with Discord
      </button>
    </div>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div class="form-section active" id="s-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="dev@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign in →</button>
      <div class="alert" id="l-msg"></div>
    </div>

    <!-- 2FA -->
    <div class="form-section" id="s-2fa">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:28px;margin-bottom:8px">🔐</div>
        <div style="font-size:14px;font-weight:500">Two-Factor Authentication</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Enter the 6-digit code from your authenticator app</div>
      </div>
      <div class="field"><input type="text" id="totp-code" placeholder="000000" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:10px;padding:10px" onkeydown="if(event.key==='Enter')submit2FA()"></div>
      <button class="btn btn-primary" onclick="submit2FA()">Verify →</button>
      <button class="btn btn-outline" onclick="cancel2FA()">← Back</button>
      <div class="alert" id="twofa-msg"></div>
    </div>

    <!-- Email verification prompt -->
    <div class="form-section" id="s-verify">
      <div class="verify-box">
        <div class="icon">📧</div>
        <h3>Check your email</h3>
        <p>We sent a verification link to <strong id="verify-email-display"></strong>. Click the link to activate your account.</p>
      </div>
      <button class="btn btn-primary" onclick="resendVerification()" style="margin-top:16px">Resend verification email</button>
      <button class="btn btn-outline" onclick="cancel2FA()">← Back to login</button>
      <div class="alert" id="verify-msg"></div>
    </div>

    <!-- Register -->
    <div class="form-section" id="s-register">
      <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="yourname"></div>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="dev@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create account →</button>
      <div class="alert" id="r-msg"></div>
    </div>
  </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
const API = 'https://authforge-backend-production.up.railway.app';
const GOOGLE_CLIENT_ID = '623169749958-vc8l8hd9upjpp62fr9js8u68i7u6je5p.apps.googleusercontent.com';
const DISCORD_CLIENT_ID = 'YOUR_DISCORD_CLIENT_ID';
let pendingEmail = '', pendingPassword = '', unverifiedEmail = '';

if (localStorage.getItem('af_token')) location.href = 'dashboard.html';

function msg(id, text, type) { const el = document.getElementById(id); el.textContent = text; el.className = 'alert ' + type; el.style.display = 'block'; }

function showSection(id) {
  document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (t==='login'&&i===0)||(t==='register'&&i===1)));
  showSection(t === 'login' ? 's-login' : 's-register');
}

// Google
function googleSignIn() {
  const params = new URLSearchParams({ client_id: GOOGLE_CLIENT_ID, redirect_uri: window.location.origin + window.location.pathname, response_type: 'code', scope: 'openid email profile', access_type: 'offline', prompt: 'select_account', state: 'google_oauth' });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

// Discord
function discordSignIn() {
  const params = new URLSearchParams({ client_id: DISCORD_CLIENT_ID, redirect_uri: window.location.origin + window.location.pathname, response_type: 'code', scope: 'identify email', state: 'discord_oauth' });
  window.location.href = 'https://discord.com/api/oauth2/authorize?' + params.toString();
}

// Handle OAuth callbacks
async function applyTheme() {
  const r = await fetch(API + '/api/public/config');
  const d = await r.json();
  const c = d.config || {};
  if (c.theme && c.theme !== 'dark') document.body.className = 'theme-' + c.theme;
}
applyTheme();

async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const verifyToken = params.get('verify');
  const teamInvite = params.get('team_invite');

  if (verifyToken) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const r = await fetch(API + '/api/auth/verify-email?token=' + verifyToken);
      const d = await r.json();
      showSection('s-login');
      msg('l-msg', r.ok ? '✅ ' + d.message : d.error, r.ok ? 'ok' : 'err');
    } catch { msg('l-msg','Verification failed','err'); }
    return;
  }

  if (teamInvite) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const r = await fetch(API + '/api/team/accept/' + teamInvite, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('af_token')} });
      const d = await r.json();
      if (r.ok) { location.href = 'dashboard.html'; }
      else msg('l-msg', d.error, 'err');
    } catch { msg('l-msg','Failed to accept invite','err'); }
    return;
  }

  if (!code) return;
  history.replaceState({}, '', window.location.pathname);

  if (state === 'google_oauth') {
    try {
      const r = await fetch(API + '/api/auth/google-code', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code, redirect_uri: window.location.origin + window.location.pathname}) });
      const d = await r.json();
      if (!r.ok) { showSection('s-login'); return msg('l-msg', d.error||'Google login failed','err'); }
      saveAndRedirect(d);
    } catch { showSection('s-login'); msg('l-msg','Cannot connect to server','err'); }
  }

  if (state === 'discord_oauth') {
    try {
      const r = await fetch(API + '/api/auth/discord-code', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code, redirect_uri: window.location.origin + window.location.pathname}) });
      const d = await r.json();
      if (!r.ok) { showSection('s-login'); return msg('l-msg', d.error||'Discord login failed','err'); }
      saveAndRedirect(d);
    } catch { showSection('s-login'); msg('l-msg','Cannot connect to server','err'); }
  }
}

async function doLogin() {
  const email = document.getElementById('l-email').value;
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return msg('l-msg','All fields required','err');
  try {
    const r = await fetch(API + '/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const d = await r.json();
    if (d.requires_2fa) { pendingEmail = email; pendingPassword = password; showSection('s-2fa'); return; }
    if (d.requires_verification) { unverifiedEmail = d.email || email; document.getElementById('verify-email-display').textContent = unverifiedEmail; showSection('s-verify'); return; }
    if (!r.ok) return msg('l-msg', d.error, 'err');
    saveAndRedirect(d);
  } catch { msg('l-msg','Cannot connect to server','err'); }
}

async function submit2FA() {
  const totp_code = document.getElementById('totp-code').value;
  if (!totp_code) return msg('twofa-msg','Enter the 6-digit code','err');
  try {
    const r = await fetch(API + '/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: pendingEmail, password: pendingPassword, totp_code}) });
    const d = await r.json();
    if (!r.ok) return msg('twofa-msg', d.error, 'err');
    saveAndRedirect(d);
  } catch { msg('twofa-msg','Cannot connect to server','err'); }
}

function cancel2FA() { showSection('s-login'); document.getElementById('totp-code').value = ''; pendingEmail = ''; pendingPassword = ''; }

async function resendVerification() {
  if (!unverifiedEmail) return;
  try {
    const r = await fetch(API + '/api/auth/resend-verification', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: unverifiedEmail}) });
    const d = await r.json();
    msg('verify-msg', r.ok ? d.message : d.error, r.ok ? 'ok' : 'err');
  } catch { msg('verify-msg','Cannot connect to server','err'); }
}

async function doRegister() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  if (!username || !email || !password) return msg('r-msg','All fields required','err');
  try {
    const r = await fetch(API + '/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, email, password}) });
    const d = await r.json();
    if (!r.ok) return msg('r-msg', d.error, 'err');
    // Show verification prompt
    unverifiedEmail = email;
    document.getElementById('verify-email-display').textContent = email;
    showSection('s-verify');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  } catch { msg('r-msg','Cannot connect to server','err'); }
}

function saveAndRedirect(d) {
  localStorage.setItem('af_token', d.token);
  localStorage.setItem('af_user', JSON.stringify(d.developer));
  location.href = 'dashboard.html';
}

handleOAuthCallback();
</script>
</body>
</html>
